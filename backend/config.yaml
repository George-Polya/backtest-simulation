# LLM Provider Configuration (LangChain → OpenRouter API)
llm:
  provider: "langchain"
  model:
    name: "openai/gpt-5.4"
    max_context_tokens: 1000000
    max_output_tokens: 128000
    reasoning_effort: "low"
  temperature: 0.0 # Lower = more deterministic (0.0 = most deterministic)
  seed: 42  # Random seed for reproducible outputs
  reasoning_enabled: true  # Enable reasoning for thinking models
  # Web search for real-time documentation lookup (OpenRouter only)
  web_search_enabled: true  # Enable real-time document search
  web_search_max_results: 3  # Number of search results (1-10, default: 5)
  agent_max_iterations: 4  # Maximum model turns for the code-generation agent
  agent_timeout_seconds: 1800  # Timeout for one agent generation run
  agent_debug_logging: true  # Verbose agent/tool iteration logging
  agent_enable_checkpointer: false  # LangGraph MemorySaver (debugging only)


# Data Provider Configuration
data:
  provider: "yfinance"  # yfinance | local | mock
  local_storage_path: "./data/prices"  # CSV storage path (used when provider='local')
  is_paper: true  # Use paper trading mode (when live trading API key unavailable)
  fallback_providers: ["mock"]  # Fallback providers if primary fails
  cache_ttl_seconds: 300

# Code Execution Configuration
execution:
  provider: "docker"  # docker | local
  fallback_to_local: true  # Fallback to local if Docker fails
  docker_image: "backtest-runner:latest"  # Custom image with backtesting dependencies
  timeout: 300
  memory_limit: "2g"
  allowed_modules:
    - pandas
    - numpy
