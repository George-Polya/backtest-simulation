version: '3.8'

services:
  # ===========================================
  # Backend - FastAPI Application
  # ===========================================
  backtest-api:
    build:
      context: backend
      dockerfile: Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY:-local}/backtest-api:latest
    container_name: backtest-api
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      - APP_DEBUG=${APP_DEBUG:-false}
      - EXECUTION__DOCKER_IMAGE=ghcr.io/${GITHUB_REPOSITORY:-local}/backtest-runner:latest
    volumes:
      # Persist price cache data
      - ./data:/app/data
      # Mount config for easy updates (optional, remove in production)
      - ./backend/config.yaml:/app/backend/config.yaml:ro
      # Docker socket for DooD (Docker out of Docker)
      # Allows spawning sibling containers for isolated code execution
      - /var/run/docker.sock:/var/run/docker.sock
      # Workspace for code execution (must be accessible by sibling containers)
      - /tmp/backtest_workspaces:/tmp/backtest_workspaces
    # Grant access to docker socket
    group_add:
      - ${DOCKER_GID:-999}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - backtest-network
    depends_on:
      backtest-runner-build:
        condition: service_completed_successfully

  # ===========================================
  # Frontend - Next.js Application
  # ===========================================
  backtest-frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    image: ghcr.io/${GITHUB_REPOSITORY:-local}/backtest-frontend:latest
    container_name: backtest-frontend
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - backtest-network
    depends_on:
      backtest-api:
        condition: service_healthy

  # ===========================================
  # Backtest Runner Image Builder (one-time)
  # This builds the sandbox image on first run
  # ===========================================
  backtest-runner-build:
    build:
      context: backend/docker-runner
      dockerfile: Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY:-local}/backtest-runner:latest
    container_name: backtest-runner-build
    # This container just builds the image and exits
    command: ["echo", "Backtest runner image built successfully"]
    restart: "no"

networks:
  backtest-network:
    driver: bridge
